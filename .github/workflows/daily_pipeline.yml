name: SPY 1DTE IV Pipeline

on:
  schedule:
    # Dual schedule handles DST automatically:
    #   4:00 pm EDT (Mar–Nov, UTC-4)  →  20:00 UTC
    #   4:00 pm EST (Nov–Mar, UTC-5)  →  21:00 UTC
    # The timing guard step below ensures only one of the two ever actually runs.
    - cron: '0 20 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:   # manual trigger from the GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit snapshots and plots back to the repo

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. DST guard ─────────────────────────────────────────────────────────
      # The dual cron means one trigger fires at the wrong ET hour during the
      # non-matching half of the year.  This step gates everything downstream:
      # only proceed if it is actually 4 pm ET, or if triggered manually.
      - name: Check ET time
        id: timing
        run: |
          python3 - <<'EOF'
          from datetime import datetime
          import zoneinfo, os
          event    = os.environ.get("GITHUB_EVENT_NAME", "")
          now_et   = datetime.now(zoneinfo.ZoneInfo("America/New_York"))
          is_4pm   = now_et.hour == 16
          is_manual = event == "workflow_dispatch"
          should_run = is_4pm or is_manual
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"should_run={'true' if should_run else 'false'}\n")
              fh.write(f"run_date={now_et.strftime('%Y-%m-%d')}\n")
          print(f"Event={event}  ET={now_et.strftime('%H:%M')}  should_run={should_run}")
          EOF

      # ── 3. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        if: steps.timing.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'Desktop/Files/Python Workspace/1DTE-SPX-OPTION/requirements.txt'

      # ── 4. Dependencies ───────────────────────────────────────────────────────
      - name: Install dependencies
        if: steps.timing.outputs.should_run == 'true'
        working-directory: "Desktop/Files/Python Workspace/1DTE-SPX-OPTION"
        run: pip install -r requirements.txt

      # ── 5. Run pipeline ───────────────────────────────────────────────────────
      - name: Run SPY 1DTE pipeline
        if: steps.timing.outputs.should_run == 'true'
        working-directory: "Desktop/Files/Python Workspace/1DTE-SPX-OPTION"
        run: python3 spy_1dte_vol_pipeline.py | tee /tmp/pipeline_output.txt

      # ── 6. Commit results ─────────────────────────────────────────────────────
      # Snapshots, plots, and rates cache are committed back so history
      # accumulates in the repo across runs.
      - name: Commit snapshot, plots, and cache
        if: steps.timing.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Desktop/Files/Python Workspace/1DTE-SPX-OPTION/data/snapshots/"
          git add "Desktop/Files/Python Workspace/1DTE-SPX-OPTION/data/plots/"
          git add "Desktop/Files/Python Workspace/1DTE-SPX-OPTION/data/rates_cache.json"
          git diff --cached --quiet \
            && echo "Nothing new to commit." \
            || git commit -m "chore: pipeline run $(date -u '+%Y-%m-%d')"
          git push

      # ── 7. Email notification ─────────────────────────────────────────────────
      - name: Send completion email
        if: steps.timing.outputs.should_run == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.GMAIL_USERNAME }}
          password:       ${{ secrets.GMAIL_APP_PASSWORD }}
          to:             ${{ secrets.GMAIL_USERNAME }}, ${{ secrets.EXTRA_RECIPIENTS }}
          from:           SPY 1DTE Pipeline <${{ secrets.GMAIL_USERNAME }}>
          subject:        "SPY 1DTE Pipeline ✓  ${{ steps.timing.outputs.run_date }}"
          body:           file:///tmp/pipeline_output.txt
          convert_markdown: false
