name: SPY 1DTE IV Pipeline

on:
  schedule:
    # 21:00 UTC every weekday:
    #   EDT (Mar–Nov, UTC-4)  →  5:00 pm ET  (1 hr after close — same-day data)
    #   EST (Nov–Mar, UTC-5)  →  4:00 pm ET  (exactly at close)
    # Single cron avoids DST-guard timing issues caused by GitHub queue delays.
    - cron: '0 21 * * 1-5'
  workflow_dispatch:   # manual trigger from the GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit snapshots and plots back to the repo

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Capture run date ───────────────────────────────────────────────────
      - name: Set run date
        id: timing
        run: |
          python3 - <<'EOF'
          from datetime import datetime
          import zoneinfo, os
          now_et = datetime.now(zoneinfo.ZoneInfo("America/New_York"))
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"run_date={now_et.strftime('%Y-%m-%d')}\n")
          print(f"ET={now_et.strftime('%H:%M')}  run_date={now_et.strftime('%Y-%m-%d')}")
          EOF

      # ── 3. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'Desktop/Files/Python Workspace/1DTE-SPX-OPTION/requirements.txt'

      # ── 4. Dependencies ───────────────────────────────────────────────────────
      - name: Install dependencies
        working-directory: "Desktop/Files/Python Workspace/1DTE-SPX-OPTION"
        run: pip install -r requirements.txt

      # ── 5. Run pipeline ───────────────────────────────────────────────────────
      - name: Run SPY 1DTE pipeline
        working-directory: "Desktop/Files/Python Workspace/1DTE-SPX-OPTION"
        env:
          TZ: America/New_York
        run: python3 spy_1dte_vol_pipeline.py | tee /tmp/pipeline_output.txt

      # ── 6. Commit results ─────────────────────────────────────────────────────
      # Snapshots, plots, and rates cache are committed back so history
      # accumulates in the repo across runs.
      - name: Commit snapshot, plots, and cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "Desktop/Files/Python Workspace/1DTE-SPX-OPTION/data/snapshots/"
          git add -f "Desktop/Files/Python Workspace/1DTE-SPX-OPTION/data/plots/"
          git add -f "Desktop/Files/Python Workspace/1DTE-SPX-OPTION/data/rates_cache.json"
          git diff --cached --quiet \
            && echo "Nothing new to commit." \
            || git commit -m "chore: pipeline run $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push

      # ── 7. Build email body ───────────────────────────────────────────────────
      - name: Build email body
        run: |
          python3 - <<'EOF'
          import re

          RUN_DATE  = "${{ steps.timing.outputs.run_date }}"
          BASE_URL  = (
              "https://github.com/the-tyler/0DTE/blob/main/"
              "Desktop/Files/Python%20Workspace/1DTE-SPX-OPTION/data"
          )

          lines = open("/tmp/pipeline_output.txt").readlines()

          # Drop lines the user doesn't want in the email
          SKIP = ["Risk-free rate", "Dividend yield", "Forward:"]
          filtered = []
          for line in lines:
              if any(p in line for p in SKIP):
                  continue
              # Strip "  T = 0.002740 yr" from the expiry line
              line = re.sub(r",\s*T\s*=\s*[\d.]+\s*yr", "", line)
              filtered.append(line)

          body_text = "".join(filtered).strip()

          html = f"""<!DOCTYPE html>
          <html><body style="font-family:sans-serif;color:#222">
          <pre style="font-family:monospace;font-size:13px;line-height:1.6;
                      background:#f6f8fa;padding:16px;border-radius:6px">{body_text}</pre>
          <hr style="border:none;border-top:1px solid #ddd;margin:20px 0">
          <table style="border-collapse:collapse;font-size:14px">
            <tr>
              <td style="padding:6px 16px 6px 0"><b>Smile Plot</b></td>
              <td><a href="{BASE_URL}/plots/smile_{RUN_DATE}.png">View on GitHub</a></td>
            </tr>
            <tr>
              <td style="padding:6px 16px 6px 0"><b>Pillar History</b></td>
              <td><a href="{BASE_URL}/plots/pillar_history_{RUN_DATE}.png">View on GitHub</a></td>
            </tr>
            <tr>
              <td style="padding:6px 16px 6px 0"><b>Snapshot Data</b></td>
              <td><a href="{BASE_URL}/snapshots/{RUN_DATE}.parquet">Download .parquet</a></td>
            </tr>
          </table>
          </body></html>"""

          open("/tmp/email_body.html", "w").write(html)
          print("Email body written.")
          EOF

      # ── 8. Send email ─────────────────────────────────────────────────────────
      - name: Send completion email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    465
          secure:         true
          username:       ${{ secrets.GMAIL_USERNAME }}
          password:       ${{ secrets.GMAIL_APP_PASSWORD }}
          to:             ${{ secrets.GMAIL_USERNAME }}, ${{ secrets.EXTRA_RECIPIENTS }}
          from:           SPY 1DTE Pipeline <${{ secrets.GMAIL_USERNAME }}>
          subject:        "SPY 1DTE Pipeline ✓  ${{ steps.timing.outputs.run_date }}"
          html_body:      file:///tmp/email_body.html
