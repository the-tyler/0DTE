name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'Desktop/Files/Python Workspace/1DTE-SPX-OPTION/requirements.txt'

      - name: Install dependencies
        working-directory: "Desktop/Files/Python Workspace/1DTE-SPX-OPTION"
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: "Desktop/Files/Python Workspace/1DTE-SPX-OPTION"
        run: pytest
